<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple VR Scene Template</title>

  <!-- A-Frame includes WebXR support and automatically shows the Enter VR button. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script type="module" src="./main.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.68);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 320px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="note">
    Open this page in Meta Quest Browser and press Enter VR.
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    background="color: #CFE8FF"
  >
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="3 6 2"></a-entity>

    <a-sky color="#CFE8FF"></a-sky>

    <!-- Simple player rig with a camera at normal standing height. -->
    <a-entity id="player-rig" position="0 0 4">
      <a-camera id="player-camera" position="0 1.6 0" wasd-controls-enabled="false"></a-camera>
    </a-entity>

    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="24"
      height="24"
      color="#4FAD5B"
    ></a-plane>

    <a-box
      position="-1.25 1 -3"
      rotation="0 35 0"
      width="1"
      height="1"
      depth="1"
      color="#F28749"
    ></a-box>

    <a-sphere
      position="1.4 1.2 -4"
      radius="0.7"
      color="#6A7BFF"
    ></a-sphere>

    <a-cylinder
      position="0 0.9 -5.75"
      radius="0.45"
      height="1.8"
      color="#FFD166"
    ></a-cylinder>

    <a-plane position="0 2.8 -3" width="4.8" height="0.9" color="#FFFFFF">
      <a-text
        value="Simple VR Scene Template"
        position="0 0 0.01"
        color="#111111"
        width="4.2"
        align="center"
      ></a-text>
    </a-plane>
  </a-scene>
</body>
</html>
