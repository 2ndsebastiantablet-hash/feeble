<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest VR Prototype</title>

  <!-- A-Frame includes WebXR support and creates the Enter VR button automatically. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="./gorilla-locomotion.js" defer></script>
  <script type="module" src="./main.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 360px;
      line-height: 1.45;
    }

    #multiplayer-ui {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10;
      width: min(420px, calc(100vw - 24px));
      color: white;
      background: rgba(0, 0, 0, 0.74);
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
    }

    #multiplayer-ui h2 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .mp-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    #multiplayer-ui input,
    #multiplayer-ui button {
      font: inherit;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    #multiplayer-ui input {
      flex: 1 1 160px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
    }

    #multiplayer-ui button {
      cursor: pointer;
      background: #235f9f;
      color: white;
    }

    #multiplayer-status,
    #public-lobbies {
      margin-top: 8px;
    }

    #public-lobbies button {
      margin-left: 6px;
      padding: 4px 8px;
    }
  </style>
</head>
<body>
  <div id="note">
    Open this page in Meta Quest Browser, press Enter VR, use the left joystick to move, and press
    the right A button to jump.
  </div>
  <div id="multiplayer-ui">
    <h2>Multiplayer</h2>
    <div class="mp-row">
      <input id="api-base" placeholder="https://your-worker.workers.dev" />
      <input id="player-name" value="Quest Player" />
    </div>
    <div class="mp-row">
      <input id="lobby-name" value="Quest Room" />
      <input id="lobby-code" placeholder="Private code" />
    </div>
    <div class="mp-row">
      <button id="create-public">Create Public</button>
      <button id="create-private">Create Private</button>
      <button id="join-code">Join By Code</button>
      <button id="refresh-lobbies">Refresh</button>
      <button id="leave-lobby">Leave</button>
    </div>
    <div id="multiplayer-status">Multiplayer idle.</div>
    <div id="public-lobbies"></div>
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    background="color: #CFE8FF"
  >
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="3 6 2"></a-entity>

    <a-sky color="#CFE8FF"></a-sky>

    <a-entity
      id="player-rig"
      position="0 0 4"
      simple-vr-locomotion="leftController: #left-hand; rightController: #right-hand; camera: #player-camera"
    >
      <a-camera id="player-camera" position="0 0 0" wasd-controls-enabled="false"></a-camera>

      <a-entity id="left-hand" position="-0.25 1.2 -0.5" oculus-touch-controls="hand: left">
        <a-sphere id="left-hand-visual" radius="0.12" color="#FF7AA2" opacity="0.95"></a-sphere>
      </a-entity>

      <a-entity id="right-hand" position="0.25 1.2 -0.5" oculus-touch-controls="hand: right">
        <a-sphere id="right-hand-visual" radius="0.12" color="#6FC3FF" opacity="0.95"></a-sphere>
      </a-entity>
    </a-entity>

    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="24"
      height="24"
      color="#4FAD5B"
      locomotion-collider="type: floor; size: 24 0 24"
    ></a-plane>

    <a-box
      position="0 1 -3"
      width="1.8"
      height="2"
      depth="1.8"
      color="#F28749"
      locomotion-collider="type: box; size: 1.8 2 1.8"
    ></a-box>

    <a-box
      position="-2.2 1.5 -5"
      width="1.6"
      height="3"
      depth="1.6"
      color="#E35D6A"
      locomotion-collider="type: box; size: 1.6 3 1.6"
    ></a-box>

    <a-box
      position="2.4 0.8 -4.5"
      width="2.4"
      height="1.6"
      depth="1.6"
      color="#6A7BFF"
      locomotion-collider="type: box; size: 2.4 1.6 1.6"
    ></a-box>

    <a-box
      position="0 1.25 -7"
      width="6"
      height="2.5"
      depth="0.6"
      color="#9A6CF0"
      locomotion-collider="type: box; size: 6 2.5 0.6"
    ></a-box>

    <a-plane position="0 2.8 -3" width="4.8" height="0.9" color="#FFFFFF">
      <a-text
        value="Quest VR Prototype"
        position="0 0 0.01"
        color="#111111"
        width="4.35"
        align="center"
      ></a-text>
    </a-plane>

    <a-entity id="remote-players"></a-entity>
  </a-scene>
</body>
</html>
