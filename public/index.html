<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FEEBLE</title>

  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="./gorilla-locomotion.js" defer></script>
  <script type="module" src="./main.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.65);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 360px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="note">
    Loading the Neighborhood hub...
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    fog="type: linear; color: #DDEED5; near: 40; far: 120"
    day-night-cycle="dayDuration: 120; nightDuration: 720; maxDays: 5"
  >
    <a-entity id="ambient-light" light="type: ambient; intensity: 0.64; color: #FFFFFF"></a-entity>
    <a-entity id="sun-light" light="type: directional; intensity: 1.05; color: #FFF2C4" position="12 34 -48"></a-entity>
    <a-entity id="moon-light" light="type: directional; intensity: 0.08; color: #8AA0FF" position="-10 20 -48"></a-entity>

    <a-sky id="sky" color="#DDF1FF"></a-sky>
    <a-sphere id="sun" position="0 36 -80" radius="3.8" color="#FFF3BF" shader="flat"></a-sphere>
    <a-sphere id="moon" position="0 30 -80" radius="2.7" color="#DCE4FF" shader="flat" visible="false"></a-sphere>

    <a-entity id="cycle-display" position="0 18 -28" face-player="target: #player-camera">
      <a-plane width="10.5" height="2.9" color="#09111C" opacity="0.48"></a-plane>
      <a-text
        id="cycle-phase"
        value="DAY 1 / 5   NIGHT IN"
        position="0 0.56 0.02"
        align="center"
        color="#F8FBFF"
        width="11"
      ></a-text>
      <a-text
        id="cycle-timer"
        value="02:00"
        position="0 -0.34 0.02"
        align="center"
        color="#FFF4C7"
        width="18"
      ></a-text>
    </a-entity>

    <a-entity
      id="player-rig"
      position="0 0 8"
      simple-vr-locomotion="leftController: #left-hand; rightController: #right-hand; camera: #player-camera"
    >
      <a-camera id="player-camera" position="0 0 0" wasd-controls-enabled="false"></a-camera>

      <a-entity
        id="left-hand"
        position="-0.25 1.2 -0.5"
        oculus-touch-controls="hand: left"
        hand-grabber
      >
        <a-sphere id="left-hand-visual" radius="0.12" color="#FF7AA2" opacity="0.95"></a-sphere>
      </a-entity>

      <a-entity
        id="right-hand"
        position="0.25 1.2 -0.5"
        oculus-touch-controls="hand: right"
        hand-grabber
      >
        <a-sphere id="right-hand-visual" radius="0.12" color="#6FC3FF" opacity="0.95"></a-sphere>
      </a-entity>
    </a-entity>

    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="180"
      height="180"
      color="#6FA946"
      locomotion-collider="type: floor; size: 180 0 180"
    ></a-plane>

    <a-plane
      position="0 0.02 0"
      rotation="-90 0 0"
      width="8"
      height="170"
      color="#51545B"
    ></a-plane>
    <a-plane
      position="0 0.025 0"
      rotation="-90 0 0"
      width="0.28"
      height="150"
      color="#F6D45C"
    ></a-plane>
    <a-plane
      position="-4.7 0.03 0"
      rotation="-90 0 0"
      width="1.4"
      height="170"
      color="#CFC9B7"
      opacity="0.55"
    ></a-plane>
    <a-plane
      position="4.7 0.03 0"
      rotation="-90 0 0"
      width="1.4"
      height="170"
      color="#CFC9B7"
      opacity="0.55"
    ></a-plane>

    <a-entity id="world-root"></a-entity>
    <a-entity id="remote-players"></a-entity>
  </a-scene>
</body>
</html>
