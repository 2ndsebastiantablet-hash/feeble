<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest Gorilla Locomotion Prototype</title>

  <!-- A-Frame includes WebXR support and creates the Enter VR button automatically. -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="./main.js" defer></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 360px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="note">
    Open this page in Meta Quest Browser, press Enter VR, and push your hand spheres against the
    floor or blocks to move. Thumbsticks, teleport, and keyboard movement are intentionally disabled.
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
    background="color: #CFE8FF"
  >
    <a-entity light="type: ambient; intensity: 0.7"></a-entity>
    <a-entity light="type: directional; intensity: 0.9" position="3 6 2"></a-entity>

    <a-sky color="#CFE8FF"></a-sky>

    <a-entity
      id="player-rig"
      position="0 0 4"
      gorilla-locomotion="leftHand: #left-hand; rightHand: #right-hand; head: #player-camera; debugText: #debug-text"
    >
      <a-camera id="player-camera" position="0 1.6 0" wasd-controls-enabled="false">
        <a-entity id="debug-panel" position="0 -0.28 -1.1">
          <a-plane width="1.3" height="0.5" color="#111111" opacity="0.8"></a-plane>
          <a-text
            id="debug-text"
            position="0 0 0.01"
            align="center"
            width="1.95"
            color="#FFFFFF"
            value="Waiting for hand tracking..."
          ></a-text>
        </a-entity>
      </a-camera>

      <a-entity id="left-hand" position="-0.35 1.2 -0.4" tracked-controls="hand: left">
        <a-sphere radius="0.12" color="#FF7AA2" opacity="0.95"></a-sphere>
      </a-entity>

      <a-entity id="right-hand" position="0.35 1.2 -0.4" tracked-controls="hand: right">
        <a-sphere radius="0.12" color="#6FC3FF" opacity="0.95"></a-sphere>
      </a-entity>
    </a-entity>

    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="24"
      height="24"
      color="#4FAD5B"
      locomotion-collider="type: floor; size: 24 0 24"
    ></a-plane>

    <a-box
      position="0 1 -3"
      width="1.8"
      height="2"
      depth="1.8"
      color="#F28749"
      locomotion-collider="type: box; size: 1.8 2 1.8"
    ></a-box>

    <a-box
      position="-2.2 1.5 -5"
      width="1.6"
      height="3"
      depth="1.6"
      color="#E35D6A"
      locomotion-collider="type: box; size: 1.6 3 1.6"
    ></a-box>

    <a-box
      position="2.4 0.8 -4.5"
      width="2.4"
      height="1.6"
      depth="1.6"
      color="#6A7BFF"
      locomotion-collider="type: box; size: 2.4 1.6 1.6"
    ></a-box>

    <a-box
      position="0 1.25 -7"
      width="6"
      height="2.5"
      depth="0.6"
      color="#9A6CF0"
      locomotion-collider="type: box; size: 6 2.5 0.6"
    ></a-box>

    <a-plane position="0 2.8 -3" width="4.8" height="0.9" color="#FFFFFF">
      <a-text
        value="Quest Gorilla Locomotion Prototype"
        position="0 0 0.01"
        color="#111111"
        width="4.35"
        align="center"
      ></a-text>
    </a-plane>
  </a-scene>
</body>
</html>
