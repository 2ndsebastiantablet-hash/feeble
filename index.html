<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quest WebXR Test Scene</title>

  <!-- A-Frame includes WebXR support and creates the Enter VR button automatically -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #note {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.65);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      max-width: 320px;
    }
  </style>
</head>

<body>
  <div id="note">
    Open this page in Meta Quest Browser, then press Enter VR.
  </div>

  <a-scene
    renderer="antialias: true; colorManagement: true"
    vr-mode-ui="enabled: true"
  >
    <!-- Camera / player starting position -->
    <a-entity position="0 1.6 4">
      <a-camera wasd-controls-enabled="false"></a-camera>
    </a-entity>

    <!-- Lighting -->
    <a-entity light="type: ambient; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; intensity: 0.8" position="2 5 3"></a-entity>

    <!-- Sky -->
    <a-sky color="#87CEEB"></a-sky>

    <!-- Floor -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="20"
      height="20"
      color="#4CAF50"
    ></a-plane>

    <!-- Simple VR objects -->
    <a-box
      position="-1 1 -3"
      rotation="0 45 0"
      color="#FF5555"
      depth="1"
      height="1"
      width="1"
      animation="property: rotation; to: 0 405 0; loop: true; dur: 6000; easing: linear"
    ></a-box>

    <a-sphere
      position="1.5 1.25 -4"
      radius="0.75"
      color="#3366FF"
    ></a-sphere>

    <a-cylinder
      position="0 0.75 -6"
      radius="0.5"
      height="1.5"
      color="#FFD700"
    ></a-cylinder>

    <!-- Text label in the VR world -->
    <a-plane
      position="0 2.4 -3"
      width="4.8"
      height="0.9"
      color="#FFFFFF"
    >
      <a-text
        value="Quest WebXR Test Scene"
        position="0 0 0.01"
        color="#111111"
        width="4.2"
        align="center"
      ></a-text>
    </a-plane>
  </a-scene>
</body>
</html>
